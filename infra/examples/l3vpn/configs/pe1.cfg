system {
    host-name pe1;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 10.255.0.1/32;
            }
        }
    }
    ge-0/0/0 {
        description "PE-PE link to pe2";
        unit 0 {
            family inet {
                address 10.0.12.0/31;
            }
            family mpls;
        }
    }
    ge-0/0/1 {
        description "CE-facing interface in CUSTOMERS VRF";
        unit 0 {
            family inet {
                address 10.100.1.1/24;
            }
        }
    }
}
routing-options {
    autonomous-system 65000;
    router-id 10.255.0.1;
    static {
        route 10.255.0.2/32 next-hop 10.0.12.1;
    }
}
routing-instances {
    CUSTOMERS {
        instance-type vrf;
        route-distinguisher 10.255.0.1:100;
        vrf-target target:65000:100;
        interface ge-0/0/1.0;
        routing-options {
            static {
                route 10.100.1.0/24 discard;
            }
        }
    }
}
protocols {
    bgp {
        group PE-MESH {
            type internal;
            local-address 10.255.0.1;
            family inet-vpn {
                unicast;
            }
            neighbor 10.255.0.2;
        }
    }
    ldp {
        interface ge-0/0/0.0;
    }
    mpls {
        interface ge-0/0/0.0;
    }
}

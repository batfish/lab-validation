hostname r2
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Ethernet1
   no switchport
   ip address 10.0.0.1/31
!
ip routing
!
router bgp 65002
   router-id 2.2.2.2
   neighbor 10.0.0.0 remote-as 65001
   network 2.2.2.2/32
!

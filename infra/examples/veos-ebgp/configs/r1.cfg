hostname r1
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
interface Loopback0
   ip address 1.1.1.1/32
!
interface Ethernet1/1
   no switchport
   ip address 10.0.0.0/31
!
ip routing
!
router bgp 65001
   router-id 1.1.1.1
   neighbor 10.0.0.1 remote-as 65002
   network 1.1.1.1/32
!

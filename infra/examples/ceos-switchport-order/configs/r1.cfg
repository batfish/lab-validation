hostname r1
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
interface Loopback0
   ip address 1.1.1.1/32
!
! Key test: ip address BEFORE no switchport
interface Ethernet1
   ip address 10.0.0.0/31
   no switchport
!
ip routing
!
router bgp 65001
   router-id 1.1.1.1
   neighbor 10.0.0.1 remote-as 65002
   network 1.1.1.1/32
!

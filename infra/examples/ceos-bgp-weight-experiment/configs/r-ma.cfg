! Multi-agent test router. Originates experiment prefixes locally, and
! also receives the same prefixes from r-upstream. Different
! prefix/route-map combinations let us measure the effective default
! value Arista EOS uses for locally-originated BGP paths on each of
! the relevant best-path-selection attributes.
!
! Mode: multi-agent (the default on modern EOS; explicit for clarity).
!
hostname r-ma
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
service routing protocols model multi-agent
!
interface Loopback100
   ip address 10.100.0.200/24
!
interface Loopback200
   ip address 10.200.0.200/24
!
interface Loopback101
   ip address 10.101.0.200/24
!
interface Loopback102
   ip address 10.102.0.200/24
!
interface Ethernet1
   no switchport
   ip address 10.0.1.0/31
!
ip routing
!
! Route-map on the `network` statement for one prefix — tests whether
! `set weight` applied via route-map takes effect on local paths.
route-map SET_WEIGHT_50000 permit 10
   set weight 50000
!
! Inbound route-map. The `set` statements only fire on matching
! prefixes, so each experimental prefix gets exactly the nudges it
! needs to isolate one best-path attribute. Everything else passes
! through unchanged via the final permit.
!
! 10.100.0.0/24: received path gets weight 10000. Tests local-path
!   default weight: if local (weight 0) loses, default < 10000; if
!   local wins, default >= 10000.
ip prefix-list PL_WEIGHT_TEST seq 10 permit 10.100.0.0/24
route-map PEER_IN permit 10
   match ip address prefix-list PL_WEIGHT_TEST
   set weight 10000
!
! 10.200.0.0/24: received path gets weight 10000 too. Tests whether
!   a route-map `set weight 50000` on the `network` statement
!   overrides the local-path default.
ip prefix-list PL_RMAP_WEIGHT_TEST seq 10 permit 10.200.0.0/24
route-map PEER_IN permit 20
   match ip address prefix-list PL_RMAP_WEIGHT_TEST
   set weight 10000
!
! 10.101.0.0/24: received path gets local-preference 50. Weight
!   stays 0 on both sides (tied), so local-pref is the deciding step.
!   If local wins, local-pref default > 50.
ip prefix-list PL_LOCALPREF_LOW seq 10 permit 10.101.0.0/24
route-map PEER_IN permit 30
   match ip address prefix-list PL_LOCALPREF_LOW
   set local-preference 50
!
! 10.102.0.0/24: received path gets local-preference 150. Weight
!   stays 0 on both sides. If local wins, local-pref default >= 150.
!   If received wins, local-pref default < 150. Combined with the
!   10.101 prefix, this brackets the default around the standard 100.
ip prefix-list PL_LOCALPREF_HIGH seq 10 permit 10.102.0.0/24
route-map PEER_IN permit 40
   match ip address prefix-list PL_LOCALPREF_HIGH
   set local-preference 150
!
! Default: permit untouched (must be last).
route-map PEER_IN permit 100
!
router bgp 200
   router-id 2.2.2.2
   neighbor 10.0.1.1 remote-as 100
   neighbor 10.0.1.1 route-map PEER_IN in
   ! Weight experiment prefixes.
   network 10.100.0.0/24
   network 10.200.0.0/24 route-map SET_WEIGHT_50000
   ! Local-pref experiment prefixes.
   network 10.101.0.0/24
   network 10.102.0.0/24
!
end

# Validation checks for the BGP unnumbered (RFC 5549) lab.
# Run after health-check, before collection:
#   lab_builder validate topology.clab.yml --checks checks.yaml

checks:
  # Point-to-point interfaces must be up
  - type: interface_up
    node: spine
    interface: Ethernet1
    description: "spine Et1 to leaf"
  - type: interface_up
    node: spine
    interface: Ethernet2
    description: "spine Et2 to leaf"
  - type: interface_up
    node: leaf
    interface: Ethernet1
    description: "leaf Et1 to spine"
  - type: interface_up
    node: leaf
    interface: Ethernet2
    description: "leaf Et2 to spine"

  # Each router should learn the other's loopback via BGP unnumbered
  - type: route_exists
    node: spine
    table: default
    prefix: 10.0.0.2/32
    description: "leaf loopback learned via BGP unnumbered"
  - type: route_exists
    node: leaf
    table: default
    prefix: 10.0.0.1/32
    description: "spine loopback learned via BGP unnumbered"

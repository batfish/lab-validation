system {
    host-name r2;
}
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.1/31;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 2.2.2.2/32;
            }
        }
    }
}
routing-options {
    autonomous-system 65002;
    router-id 2.2.2.2;
}
protocols {
    bgp {
        group ebgp {
            type external;
            neighbor 10.0.0.0 {
                peer-as 65001;
            }
            export advertise-loopback;
        }
    }
}
policy-options {
    policy-statement advertise-loopback {
        term lo0 {
            from interface lo0.0;
            then accept;
        }
        term default {
            then reject;
        }
    }
}

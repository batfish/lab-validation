system {
    host-name r1;
}
interfaces {
    ge-0/0/0 {
        unit 0 {
            family inet {
                address 10.0.0.0/31;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 1.1.1.1/32;
            }
        }
    }
}
routing-options {
    autonomous-system 65001;
    router-id 1.1.1.1;
}
protocols {
    bgp {
        group ebgp {
            type external;
            neighbor 10.0.0.1 {
                peer-as 65002;
            }
            export advertise-loopback;
        }
    }
}
policy-options {
    policy-statement advertise-loopback {
        term lo0 {
            from interface lo0.0;
            then accept;
        }
        term default {
            then reject;
        }
    }
}

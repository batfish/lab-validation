# Preconditions for the ISIS L2 lab. The framework has no dedicated IS-IS
# adjacency check, so we assert each router learned the other's system loopback
# via IS-IS — a learned IGP route proves the adjacency formed and SPF ran.

checks:
  - type: route_exists
    node: r1
    table: Base
    prefix: 3.3.3.3/32
    description: r1 learned r3 system address via IS-IS
  - type: route_exists
    node: r3
    table: Base
    prefix: 1.1.1.1/32
    description: r3 learned r1 system address via IS-IS

system {
    host-name r1;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 10.255.0.1/32;
            }
            family inet6 {
                address 2001:db8::1/128;
            }
        }
        unit 1 {
            description "RED virtual-router loopback";
            family inet {
                address 10.255.1.1/32;
            }
        }
        unit 2 {
            description "BLUE virtual-router loopback";
            family inet {
                address 10.255.2.1/32;
            }
        }
    }
}
routing-options {
    router-id 10.255.0.1;
    /*
     * Master instance inet.0 defaults block. Every static route in THIS
     * static{} block inherits these unless it sets its own value.
     */
    static {
        defaults {
            preference 50;
            metric 100;
            tag 1000;
        }
        /* Route A: inherits all three defaults (pref 50, metric 100, tag 1000). */
        route 10.200.1.0/24 discard;
        /* Route B: per-route preference 7 overrides ONLY preference;
         * metric 100 and tag 1000 are still inherited from defaults. */
        route 10.200.2.0/24 {
            discard;
            preference 7;
        }
    }
    /*
     * Master instance inet6.0 defaults block. Different defaults from
     * inet.0 above -- proves defaults are scoped per routing table.
     */
    rib inet6.0 {
        static {
            defaults {
                preference 60;
                tag 2000;
            }
            route 2001:db8:200::/48 discard;
        }
    }
}
routing-instances {
    /*
     * RED: virtual-router with a static{} block but NO defaults block.
     * Its route falls back to the system default preference (5), proving
     * the master instance's defaults do NOT cascade into a routing-instance.
     */
    RED {
        instance-type virtual-router;
        interface lo0.1;
        routing-options {
            static {
                route 10.210.1.0/24 discard;
            }
        }
    }
    /*
     * BLUE: virtual-router with its OWN defaults block, independent of the
     * master instance and of RED.
     */
    BLUE {
        instance-type virtual-router;
        interface lo0.2;
        routing-options {
            static {
                defaults {
                    preference 80;
                    tag 3000;
                }
                route 10.220.1.0/24 discard;
            }
        }
    }
}

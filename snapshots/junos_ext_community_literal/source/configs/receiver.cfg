system {
    host-name receiver;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 2.2.2.2/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to sender";
        unit 0 {
            family inet {
                address 10.0.12.1/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65002;
    router-id 2.2.2.2;
}
protocols {
    bgp {
        group FROM-SENDER {
            type external;
            peer-as 65001;
            neighbor 10.0.12.0;
        }
    }
}

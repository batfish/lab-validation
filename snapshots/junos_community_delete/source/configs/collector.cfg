system {
    host-name collector;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 3.3.3.3/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to dut";
        unit 0 {
            family inet {
                address 10.0.23.1/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65003;
    router-id 3.3.3.3;
}
protocols {
    bgp {
        group FROM-DUT {
            type external;
            peer-as 65002;
            neighbor 10.0.23.0;
        }
    }
}

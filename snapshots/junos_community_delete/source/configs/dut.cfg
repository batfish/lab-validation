system {
    host-name dut;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 2.2.2.2/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to sender";
        unit 0 {
            family inet {
                address 10.0.12.1/31;
            }
        }
    }
    ge-0/0/1 {
        description "link to collector";
        unit 0 {
            family inet {
                address 10.0.23.0/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65002;
    router-id 2.2.2.2;
}
policy-options {
    /* The community under test: does .*:.* match ALL community types? */
    community ALL-COMMUNITIES {
        members .*:.*;
    }
    policy-statement STRIP-COMMUNITIES {
        term STRIP {
            then {
                community delete ALL-COMMUNITIES;
                accept;
            }
        }
    }
    policy-statement PASS-ALL {
        term ACCEPT {
            then accept;
        }
    }
}
protocols {
    bgp {
        group FROM-SENDER {
            type external;
            peer-as 65001;
            neighbor 10.0.12.0 {
                import STRIP-COMMUNITIES;
            }
        }
        group TO-COLLECTOR {
            type external;
            peer-as 65003;
            neighbor 10.0.23.1 {
                export PASS-ALL;
            }
        }
    }
}

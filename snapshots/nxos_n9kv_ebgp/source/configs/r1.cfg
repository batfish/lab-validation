hostname r1

feature bgp

interface loopback0
  ip address 1.1.1.1/32

interface Ethernet1/1
  no switchport
  ip address 10.0.0.0/31
  no shutdown

router bgp 65001
  router-id 1.1.1.1
  address-family ipv4 unicast
    network 1.1.1.1/32
  neighbor 10.0.0.1
    remote-as 65002
    address-family ipv4 unicast

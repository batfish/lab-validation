hostname r2

feature bgp

interface loopback0
  ip address 2.2.2.2/32

interface Ethernet1/1
  no switchport
  ip address 10.0.0.1/31
  no shutdown

router bgp 65002
  router-id 2.2.2.2
  address-family ipv4 unicast
    network 2.2.2.2/32
  neighbor 10.0.0.0
    remote-as 65001
    address-family ipv4 unicast

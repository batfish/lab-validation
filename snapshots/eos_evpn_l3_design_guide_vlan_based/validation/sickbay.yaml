entries:
  - hostname: ".*"
    test_name: test_evpn_rib_routes
    skip:
      reason: wrong local preferences, likely related to https://github.com/batfish/lab-validation/issues/8; VTEP next hop IP divergence, https://github.com/batfish/lab-validation/issues/10; locally-originated path attribute divergence, https://github.com/batfish/lab-validation/issues/152
  - hostname: ".*"
    test_name: test_bgp_rib_routes
    skip:
      reason: locally-originated path attribute divergence, https://github.com/batfish/lab-validation/issues/152; Missing VTEP next hop show data, https://github.com/batfish/lab-validation/issues/10
  - hostname: "H-LEAF2[AB]|H-SVC3[AB]|H-BL1[AB]"
    test_name: test_interface_properties
    skip:
      reason: https://github.com/batfish/lab-validation/issues/13

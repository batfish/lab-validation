# Per-host tests are sickbayed because the configs are intentionally minimal
# (designed to trigger or not trigger specific parse warnings).
entries:
  - hostname: ".*"
    test_name: test_configuration_format
    skip:
      skip_type: dont_run
      reason: "commit check lab: configs are parse-warning test fixtures, not full devices"
  - hostname: ".*"
    test_name: test_interface_properties
    skip:
      skip_type: dont_run
      reason: "commit check lab: configs are parse-warning test fixtures, not full devices"
  - hostname: ".*"
    test_name: test_main_rib_routes
    skip:
      skip_type: dont_run
      reason: "commit check lab: configs are parse-warning test fixtures, not full devices"
  - hostname: ".*"
    test_name: test_bgp_rib_routes
    skip:
      skip_type: dont_run
      reason: "commit check lab: configs are parse-warning test fixtures, not full devices"
  - hostname: ".*"
    test_name: test_evpn_rib_routes
    skip:
      skip_type: dont_run
      reason: "commit check lab: configs are parse-warning test fixtures, not full devices"

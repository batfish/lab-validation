# Expected parse warning assertions for this snapshot.
#
# Each entry specifies a host and whether Batfish should produce a fatal
# red flag warning ("Parse warning (redflag)" with "FATAL:" prefix in the
# Details column of initIssues output).
#
# For expects_fatal_warning, 'contains' specifies text that must appear in
# the warning Details, ensuring the warning is about the specific config
# line and not some unrelated issue.
#
# These assertions validate that Batfish correctly models Junos commit-time
# prefix normalization checks (batfish/batfish#9928).

expects_fatal_warning:
  # Junos rejects unnormalized prefixes in these contexts (IPv4)
  - host: rejects-static
    contains: "192.168.1.111/24"
  - host: rejects-aggregate
    contains: "192.168.1.111/24"
  - host: rejects-generate
    contains: "192.168.1.111/24"
  - host: rejects-ospf-area-range
    contains: "192.168.1.111/24"
  - host: rejects-firewall-address
    contains: "192.168.1.111/24"
  - host: rejects-firewall-next-ip
    contains: "192.168.1.111/24"
  - host: rejects-condition
    contains: "192.168.1.111/24"
  # Junos rejects unnormalized prefixes in these contexts (IPv6)
  - host: rejects-static-v6
    contains: "2001:db8::1/32"
  - host: rejects-aggregate-v6
    contains: "2001:db8::1/32"
  - host: rejects-generate-v6
    contains: "2001:db8::1/32"
  - host: rejects-ospf3-area-range
    contains: "2001:db8::1/32"
  - host: rejects-firewall6-address
    contains: "2001:db8::1/32"
  - host: rejects-firewall6-next-ip6
    contains: "2001:db8::1/32"
  - host: rejects-condition-v6
    contains: "2001:db8::1/32"

expects_no_fatal_warning:
  # Junos accepts unnormalized prefixes in these contexts (IPv4)
  - accepts-prefix-list
  - accepts-route-filter
  - accepts-snmp
  - accepts-bgp-allow
  - accepts-interface
  - accepts-mpls-install
  # Junos accepts unnormalized prefixes in these contexts (IPv6)
  - accepts-prefix-list-v6
  - accepts-route-filter-v6
  - accepts-interface-v6
  - accepts-bgp-allow-v6

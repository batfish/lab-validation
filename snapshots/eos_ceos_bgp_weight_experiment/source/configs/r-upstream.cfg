! Upstream router. Originates the experiment prefixes and advertises
! them to both test routers. The test routers independently control how
! the received paths look via inbound route-maps — r-upstream just
! needs to advertise each prefix with plain defaults.
!
hostname r-upstream
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
! Address in each experiment prefix so `network <prefix>` has a
! contributing route in the main RIB.
interface Loopback100
   ip address 10.100.0.100/24
!
interface Loopback200
   ip address 10.200.0.100/24
!
interface Loopback101
   ip address 10.101.0.100/24
!
interface Loopback102
   ip address 10.102.0.100/24
!
interface Ethernet1
   no switchport
   ip address 10.0.1.1/31
!
interface Ethernet2
   no switchport
   ip address 10.0.2.1/31
!
ip routing
!
router bgp 100
   router-id 1.1.1.1
   neighbor 10.0.1.0 remote-as 200
   neighbor 10.0.2.0 remote-as 300
   network 10.100.0.0/24
   network 10.200.0.0/24
   network 10.101.0.0/24
   network 10.102.0.0/24
!
end

! Single-agent (ribd) test router. Same experimental setup as r-ma but
! configured with the ribd routing-protocol model to characterize
! ribd-specific local-path behavior.
!
hostname r-ribd
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
service routing protocols model ribd
!
interface Loopback100
   ip address 10.100.0.200/24
!
interface Loopback200
   ip address 10.200.0.200/24
!
interface Loopback101
   ip address 10.101.0.200/24
!
interface Loopback102
   ip address 10.102.0.200/24
!
interface Ethernet1
   no switchport
   ip address 10.0.2.0/31
!
ip routing
!
route-map SET_WEIGHT_50000 permit 10
   set weight 50000
!
ip prefix-list PL_WEIGHT_TEST seq 10 permit 10.100.0.0/24
route-map PEER_IN permit 10
   match ip address prefix-list PL_WEIGHT_TEST
   set weight 10000
!
ip prefix-list PL_RMAP_WEIGHT_TEST seq 10 permit 10.200.0.0/24
route-map PEER_IN permit 20
   match ip address prefix-list PL_RMAP_WEIGHT_TEST
   set weight 10000
!
ip prefix-list PL_LOCALPREF_LOW seq 10 permit 10.101.0.0/24
route-map PEER_IN permit 30
   match ip address prefix-list PL_LOCALPREF_LOW
   set local-preference 50
!
ip prefix-list PL_LOCALPREF_HIGH seq 10 permit 10.102.0.0/24
route-map PEER_IN permit 40
   match ip address prefix-list PL_LOCALPREF_HIGH
   set local-preference 150
!
route-map PEER_IN permit 100
!
router bgp 300
   router-id 3.3.3.3
   neighbor 10.0.2.1 remote-as 100
   neighbor 10.0.2.1 route-map PEER_IN in
   network 10.100.0.0/24
   network 10.200.0.0/24 route-map SET_WEIGHT_50000
   network 10.101.0.0/24
   network 10.102.0.0/24
!
end

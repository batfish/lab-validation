# Preconditions for the L5 BGP policy-depth lab. Run with:
#   python -m lab_builder validate topology.clab.yml --checks checks.yaml
#
# Verifies the eBGP session is up and r2 learned both r1 prefixes (the routes
# whose attributes the cEOS oracle then validates). Attribute correctness
# (community/MED/as-path) is checked by the validators, not these preconditions.

checks:
  - type: bgp_peer_established
    node: r1
    neighbor: 10.0.0.1
    description: r1 eBGP to r2 established
  - type: bgp_peer_established
    node: r2
    neighbor: 10.0.0.0
    description: r2 eBGP to r1 established
  - type: route_exists
    node: r2
    table: default
    prefix: 1.1.1.1/32
    description: r2 learned r1 system address (community/MED/as-path tagged)
  - type: route_exists
    node: r2
    table: default
    prefix: 192.168.1.1/32
    description: r2 learned r1 lo1 (MED 200)

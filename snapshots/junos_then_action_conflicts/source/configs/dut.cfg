/*
 * Bootstrap dut.cfg for the junos-then-action-conflicts lab.
 *
 * This is the MINIMAL config used at containerlab boot. The full IMPORT
 * policy (~108 terms) is pushed term-by-term after boot via the
 * push-terms.py iterator, with each term's commit check verified
 * individually. After all surviving terms are committed, the snapshot's
 * configs/dut/ retained config IS the post-commit observation we want.
 *
 * Final committed state of this file (post-iteration) is regenerated by
 * working/junos-then-action-conflicts/assemble.py with the rejected
 * terms commented out.
 */
system {
    host-name dut;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 2.2.2.2/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to sender";
        unit 0 {
            family inet {
                address 10.0.12.1/31;
            }
        }
    }
    ge-0/0/1 {
        description "link to collector";
        unit 0 {
            family inet {
                address 10.0.23.0/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65002;
    router-id 2.2.2.2;
}
class-of-service {
    forwarding-classes {
        class fc1 queue-num 0;
        class fc2 queue-num 1;
    }
}
policy-options {
    /*
     * §4 community payload definitions (used as marker/tag communities).
     *   RED   = 65001:1001  BLUE = 65001:1002
     *   GREEN = 65001:1003  YELLOW = 65001:1004
     * §5 flow-control branch markers:
     *   MARK-A = 65001:9100  MARK-B = 65001:9101
     */
    community RED { members 65001:1001; }
    community BLUE { members 65001:1002; }
    community GREEN { members 65001:1003; }
    community YELLOW { members 65001:1004; }
    community MARK-A { members 65001:9100; }
    community MARK-B { members 65001:9101; }
    tunnel-attribute ta1 {
        remote-end-point 1.1.1.1;
        tunnel-type ipip;
    }
    tunnel-attribute ta2 {
        remote-end-point 2.2.2.2;
        tunnel-type ipip;
    }
    /*
     * IMPORT policy: terms are pushed in by working/.../push-terms.py
     * after boot. The catch-all REJECT-OTHER term keeps the policy
     * complete from the very first commit.
     */
    policy-statement IMPORT {
        term REJECT-OTHER {
            then reject;
        }
    }
    policy-statement EXPORT-ALL {
        then accept;
    }
}
protocols {
    bgp {
        group FROM-SENDER {
            type external;
            peer-as 65001;
            neighbor 10.0.12.0 {
                import IMPORT;
            }
        }
        group TO-COLLECTOR {
            type external;
            peer-as 65003;
            neighbor 10.0.23.1 {
                export EXPORT-ALL;
            }
        }
    }
}

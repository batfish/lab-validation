        }
        /* term 2009: as-path-prepend X; as-path-expand last-as count N */
        term PREPEND-EXPAND-LAST-AS {
            from {
                route-filter 10.50.108.0/24 exact;
            }
            then {
                as-path-prepend "65010";
                as-path-expand last-as count 2;
                accept;
            }
        }
        /* term 2010: as-path-expand last-as count M; as-path-expand last-as count N */
        term EXPAND-LAST-AS-TWICE {
            from {
                route-filter 10.50.109.0/24 exact;
            }
            then {
                as-path-expand last-as count 2;
                as-path-expand last-as count 3;
                accept;
            }
        }
        /* ============================================================
         * §4  (14 terms)
         * ============================================================ */
        /* term 3001: community add RED; community add BLUE */
        term ADD-RED-ADD-BLUE {
            from {
                route-filter 10.50.130.0/24 exact;
            }
            then {
                community add RED;
                community add BLUE;
                accept;
            }
        }
        /* term 3002: community add RED; community add RED (dedup test) */
        term ADD-RED-ADD-RED {
            from {
                route-filter 10.50.131.0/24 exact;
            }
            then {
                community add RED;
                community add RED;
                accept;
            }
        }
        /* term 3003: community delete RED; community delete BLUE */
        term DELETE-RED-DELETE-BLUE {
            from {
                route-filter 10.50.132.0/24 exact;
            }
            then {
                community delete RED;
                community delete BLUE;
                accept;
            }
        }
        /* term 3004: community set RED; community add BLUE */
        term SET-RED-ADD-BLUE {
            from {
                route-filter 10.50.133.0/24 exact;
            }
            then {
                community set RED;
                community add BLUE;
                accept;
            }
        }
        /* term 3005: community add RED; community set BLUE (does set wipe the prior add?) */
        term ADD-RED-SET-BLUE {
            from {
                route-filter 10.50.134.0/24 exact;
            }
            then {
                community add RED;
                community set BLUE;
                accept;
            }
        }
        /* term 3006: community set RED; community set BLUE (does second set replace first?) */
        term SET-RED-SET-BLUE {
            from {
                route-filter 10.50.135.0/24 exact;
            }
            then {
                community set RED;
                community set BLUE;
                accept;
            }
        }
        /* term 3007: community add RED; community delete RED (added then removed) */
        term ADD-RED-DELETE-RED {
            from {
                route-filter 10.50.136.0/24 exact;
            }
            then {
                community add RED;
                community delete RED;
                accept;
            }
        }
        /* term 3008: community delete RED; community add RED (removed then re-added) */
        term DELETE-RED-ADD-RED {
            from {
                route-filter 10.50.137.0/24 exact;
            }
            then {
                community delete RED;
                community add RED;
                accept;
            }
        }
        /* term 3009: community add RED; community delete BLUE (independent operations) */
        term ADD-RED-DELETE-BLUE {
            from {
                route-filter 10.50.138.0/24 exact;
            }
            then {
                community add RED;
                community delete BLUE;
                accept;
            }
        }
        /* term 3010: community set RED; community delete RED (set then delete what was just set) */
        term SET-RED-DELETE-RED {
            from {
                route-filter 10.50.139.0/24 exact;
            }
            then {
                community set RED;
                community delete RED;
                accept;
            }
        }
        /* term 3011: community set RED; community set BLUE; community delete RED (multi-set as two-set then delete one) */
        term SET-RED-BLUE-DELETE-RED {
            from {
                route-filter 10.50.140.0/24 exact;
            }
            then {
                community set RED;
                community set BLUE;
                community delete RED;
                accept;
            }
        }
        /* term 3012: community set RED; community set BLUE; community add GREEN (multi-set as two-set then add) */
        term SET-RED-BLUE-ADD-GREEN {
            from {
                route-filter 10.50.141.0/24 exact;
            }
            then {
                community set RED;
                community set BLUE;
                community add GREEN;
                accept;
            }
        }
        /* term 3013: community set RED; community set BLUE; community set GREEN; community set YELLOW (two multi-sets desugared) */
        term SET-RED-BLUE-SET-GREEN-YELLOW {
            from {
                route-filter 10.50.142.0/24 exact;
            }
            then {
                community set RED;
                community set BLUE;
                community set GREEN;
                community set YELLOW;
                accept;
            }
        }
        /* term 3014: community set RED; community set BLUE (two consecutive sets — does Junos collapse to one or keep both?) */
        term SET-RED-BLUE-DESUGAR-VERIFICATION {
            from {
                route-filter 10.50.143.0/24 exact;
            }
            then {
                community set RED;
                community set BLUE;
                accept;
            }
        }
        /* ============================================================
         * §5  (14 terms)
         * ============================================================ */
        /* term 4001: accept; reject; with mark interleaving */
        term FC-ACCEPT-THEN-REJECT {
            from {
                route-filter 10.50.160.0/24 exact;
            }
            then {
                community add MARK-A;
                accept;
                community add MARK-B;
                reject;
            }
        }
        /* term 4002: reject; accept; with mark interleaving */
        term FC-REJECT-THEN-ACCEPT {
            from {
                route-filter 10.50.161.0/24 exact;
            }
            then {
                community add MARK-A;
                reject;
                community add MARK-B;
                accept;
            }
        }
        /* term 4003: accept; next-term; with mark interleaving */
        term FC-ACCEPT-THEN-NEXT-TERM {
            from {
                route-filter 10.50.162.0/24 exact;
            }
            then {
                community add MARK-A;
                accept;
                community add MARK-B;
                next term;
            }
        }
        /* term 4004: next-term; accept; with mark interleaving */
        term FC-NEXT-TERM-THEN-ACCEPT {
            from {
                route-filter 10.50.163.0/24 exact;
            }
            then {
                community add MARK-A;
                next term;
                community add MARK-B;
                accept;
            }
        }
        /* term 4005: accept; next-policy; with mark interleaving */
        term FC-ACCEPT-THEN-NEXT-POLICY {
            from {
                route-filter 10.50.164.0/24 exact;
            }
            then {
                community add MARK-A;
                accept;
                community add MARK-B;
                next policy;
            }
        }
        /* term 4006: default-action accept; accept; with mark interleaving */
        term FC-DEFAULT-ACTION-ACCEPT-THEN-ACCEPT {
            from {
                route-filter 10.50.165.0/24 exact;
            }
            then {
                community add MARK-A;
                default-action accept;
                community add MARK-B;
                accept;
            }
        }
        /* term 4007: accept; default-action reject; with mark interleaving */
        term FC-ACCEPT-THEN-DEFAULT-ACTION-REJECT {
            from {
                route-filter 10.50.166.0/24 exact;
            }
            then {
                community add MARK-A;
                accept;
                community add MARK-B;
                default-action reject;
            }
        }
        /* term 4008: reject; default-action accept; with mark interleaving */
        term FC-REJECT-THEN-DEFAULT-ACTION-ACCEPT {
            from {
                route-filter 10.50.167.0/24 exact;
            }
            then {
                community add MARK-A;
                reject;
                community add MARK-B;
                default-action accept;
            }
        }
        /* term 4009: Side-effect interleaved with terminator: accept then community add - does MARK-B survive? */
        term FC-ACCEPT-THEN-SIDE-EFFECT {
            from {
                route-filter 10.50.168.0/24 exact;
            }
            then {
                community add MARK-A;
                accept;
                community add MARK-B;
            }
        }
        /* term 4010: Two side-effects + terminator (sanity baseline) - both should survive */
        term FC-TWO-SIDE-EFFECTS-THEN-ACCEPT {
            from {
                route-filter 10.50.169.0/24 exact;
            }
            then {
                community add MARK-A;
                community add MARK-B;
                accept;
            }
        }
        /* term 4011: next term; next term; with mark interleaving (same-family dedup baseline) */
        term FC-NEXT-TERM-DEDUP {
            from {
                route-filter 10.50.170.0/24 exact;
            }
            then {
                community add MARK-A;
                next term;
                community add MARK-B;
                next term;
            }
        }
        /* term 4012: next policy; next policy; with mark interleaving (same-family dedup baseline) */
        term FC-NEXT-POLICY-DEDUP {
            from {
                route-filter 10.50.171.0/24 exact;
            }
            then {
                community add MARK-A;
                next policy;
                community add MARK-B;
                next policy;
            }
        }
        /* term 4013: next term; next policy; with mark interleaving - which terminator wins? */
        term FC-NEXT-TERM-THEN-NEXT-POLICY {
            from {
                route-filter 10.50.172.0/24 exact;
            }
            then {
                community add MARK-A;
                next term;
                community add MARK-B;
                next policy;
            }
        }
        /* term 4014: next policy; next term; with mark interleaving - which terminator wins? */
        term FC-NEXT-POLICY-THEN-NEXT-TERM {
            from {
                route-filter 10.50.173.0/24 exact;
            }
            then {
                community add MARK-A;
                next policy;
                community add MARK-B;
                next term;
            }
        }
        /* ============================================================
         * §6  (3 terms)
         * ============================================================ */
        /* term 5001: load-balance per-packet; load-balance consistent-hash; */
        term FWD-LOAD-BALANCE-DUPLICATE-DIFF {
            from {
                route-filter 10.50.180.0/24 exact;
            }
            then {
                load-balance per-packet;
                load-balance consistent-hash;
                accept;
            }
        }
        /* term 5002: multipath-resolve; multipath-resolve; */
        term FWD-MULTIPATH-RESOLVE-DUPLICATE {
            from {
                route-filter 10.50.181.0/24 exact;
            }
            then {
                multipath-resolve;
                multipath-resolve;
                accept;
            }
        }
        /* term 5003: install-nexthop lsp X; install-nexthop lsp Y; */
        term FWD-INSTALL-NEXTHOP-DIFF {
            from {
                route-filter 10.50.182.0/24 exact;
            }
            then {
                install-nexthop lsp lsp-foo;
                install-nexthop lsp lsp-bar;
                accept;
            }
        }
        /* ============================================================
         * §7  (1 terms)
         * ============================================================ */
        /* term 9001: Kitchen-sink term: local-preference 200; metric 100; community add RED; accept; */
        term SANITY-CROSS-ATTRIBUTE {
            from {
                route-filter 10.50.250.0/24 exact;
            }
            then {
                local-preference 200;
                metric 100;
                community add RED;
                accept;
            }
        }
        /* Anything not matched is rejected; keeps logs clean. */
        term REJECT-OTHER {
            then reject;
        }
    }
    /* Pass-through to collector so observation point sees everything. */
    policy-statement EXPORT-ALL {
        then accept;
    }
}
protocols {
    bgp {
        group FROM-SENDER {
            type external;
            peer-as 65001;
            neighbor 10.0.12.0 {
                import IMPORT;
            }
        }
        group TO-COLLECTOR {
            type external;
            peer-as 65003;
            neighbor 10.0.23.1 {
                export EXPORT-ALL;
            }
        }
    }
}

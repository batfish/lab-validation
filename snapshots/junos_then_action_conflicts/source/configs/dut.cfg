system {
    host-name dut;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 2.2.2.2/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to sender";
        unit 0 {
            family inet {
                address 10.0.12.1/31;
            }
        }
    }
    ge-0/0/1 {
        description "link to collector";
        unit 0 {
            family inet {
                address 10.0.23.0/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65002;
    router-id 2.2.2.2;
}
class-of-service {
    forwarding-classes {
        class fc1 queue-num 0;
        class fc2 queue-num 1;
    }
    cos-next-hop-map nhm1 {
        forwarding-class fc1 {
            next-hop 192.0.2.10;
        }
    }
    cos-next-hop-map nhm2 {
        forwarding-class fc2 {
            next-hop 192.0.2.11;
        }
    }
}
policy-options {
    /*
     * §4 community payload definitions (also used as marker communities at sender).
     *   RED   = 65001:1001  BLUE = 65001:1002
     *   GREEN = 65001:1003  YELLOW = 65001:1004
     * §5 flow-control branch markers:
     *   MARK-A = 65001:9100  MARK-B = 65001:9101
     */
    community RED { members 65001:1001; }
    community BLUE { members 65001:1002; }
    community GREEN { members 65001:1003; }
    community YELLOW { members 65001:1004; }
    community MARK-A { members 65001:9100; }
    community MARK-B { members 65001:9101; }
    tunnel-attribute ta1 {
        remote-end-point 1.1.1.1;
        tunnel-type ipip;
    }
    tunnel-attribute ta2 {
        remote-end-point 2.2.2.2;
        tunnel-type ipip;
    }
    /*
     * source-class names referenced by §1 SOURCE-CLASS terms. Declared
     * here so that `then source-class scN` parses; the actual install
     * into the SCU/DCU table is not exercised by this lab.
     */
    policy-statement IMPORT {
        /* ============================================================
         * §1  (35 terms)
         * ============================================================ */
        /* term 1: origin set X; set X (dedup) */
        term ORIGIN-DEDUP {
            from {
                route-filter 10.50.1.0/24 exact;
            }
            then {
                origin igp;
                origin igp;
                accept;
            }
        }
        /* term 2: origin set X; set Y */
        term ORIGIN-DIFF {
            from {
                route-filter 10.50.2.0/24 exact;
            }
            then {
                origin igp;
                origin egp;
                accept;
            }
        }
        /* term 3: preference set X; set X (dedup) */
        term PREFERENCE-DEDUP {
            from {
                route-filter 10.50.3.0/24 exact;

/*
 * Bootstrap sender.cfg for the junos-then-action-conflicts lab.
 *
 * The minimal version contains only the BGP plumbing and a
 * pass-through EXPORT-TO-DUT policy. The 108 per-prefix static routes
 * and per-term TAG-N marking terms are pushed in via push-terms.py
 * after boot.
 */
system {
    host-name sender;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 1.1.1.1/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to dut";
        unit 0 {
            family inet {
                address 10.0.12.0/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65001;
    router-id 1.1.1.1;
}
policy-options {
    community RED    { members 65001:1001; }
    community BLUE   { members 65001:1002; }
    community GREEN  { members 65001:1003; }
    community YELLOW { members 65001:1004; }
    /*
     * EXPORT-TO-DUT: tag-and-export terms are pushed in by
     * push-terms.py. The catch-all REJECT-OTHER term keeps the policy
     * complete from boot.
     */
    policy-statement EXPORT-TO-DUT {
        term REJECT-OTHER {
            then reject;
        }
    }
}
protocols {
    bgp {
        group TO-DUT {
            type external;
            peer-as 65002;
            neighbor 10.0.12.1 {
                export EXPORT-TO-DUT;
            }
        }
    }
}

system {
    host-name collector;
}
interfaces {
    lo0 {
        unit 0 {
            family inet {
                address 3.3.3.3/32;
            }
        }
    }
    ge-0/0/0 {
        description "link to dut";
        unit 0 {
            family inet {
                address 10.0.23.1/31;
            }
        }
    }
}
routing-options {
    autonomous-system 65003;
    router-id 3.3.3.3;
}
policy-options {
    /*
     * Transparent import: accept everything dut sends, preserve all
     * communities (including the per-term marker community
     * 65001:<term-id> and the §5 flow-control MARK-A / MARK-B markers).
     * Collector is the observation point for §5 flow-control terms,
     * where dut may have rejected the route locally but the marker
     * communities reveal which branch ran.
     */
    policy-statement IMPORT-ALL {
        then accept;
    }
}
protocols {
    bgp {
        group FROM-DUT {
            type external;
            peer-as 65002;
            neighbor 10.0.23.0 {
                import IMPORT-ALL;
            }
        }
    }
}

section: "2-numeric"
notes: |
  Numeric attributes with arithmetic forms (§2 of the lab plan).

  For metric expression: uses "metric expression <base> multiplier <M> offset <O>" syntax.
  Example: "metric expression metric multiplier 2 offset 5" evaluates to (metric * 2) + 5.

  For metric igp: uses "metric igp <offset>" syntax with optional offset.
  Example: "metric igp" (bare) or "metric igp 10" (with offset).

  All tests use X=200, Y=50 as distinguishable values per the lab plan.
stubs: [] # No stubs needed for numeric attributes

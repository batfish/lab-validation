section: "1-scalars"
notes: |
  Covers scalar absolute attributes (single value, no arithmetic form).
  15 base attributes × 2 patterns (dedup/diff) + 4 next-hop special forms + 1 aigp variant = 35 terms.

  Stubs declared:
  - forwarding-class: FC1, FC2
  - cos-next-hop-map: NHM1, NHM2
  - tunnel-attribute: TA1, TA2
  - source-class: SC1, SC2

stubs:
  - "class-of-service { forwarding-classes { queue 0 fc1; queue 1 fc2; } }"
  - "class-of-service { forwarding-classes { class fc1 queue-num 0; class fc2 queue-num 1; } }"
  - "class-of-service { cos-next-hop-map nhm1 { forwarding-class fc1 { next-hop-map { 1 2; } } } }"
  - "class-of-service { cos-next-hop-map nhm2 { forwarding-class fc2 { next-hop-map { 1 3; } } } }"
  - "policy-options { tunnel-attribute ta1 { remote-end-point 1.1.1.1; } }"
  - "policy-options { tunnel-attribute ta2 { remote-end-point 2.2.2.2; } }"
  - "policy-options { source-class sc1; }"
  - "policy-options { source-class sc2; }"


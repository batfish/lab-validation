# L3 — iBGP: Nokia SR-SIM + Arista cEOS + second Nokia SR-SIM.
#
# Climbs the SR-OS ladder rung L3 (P8-LADDER.md): adds an iBGP session between
# two SR-OS routers in AS 65001 (r1 and r3) on top of the r1<->r2 eBGP session.
# Exercises the SR-OS iBGP default-accept path (no import policy on the iBGP
# group) and type-internal peering, distinct from eBGP default-reject.
#
# Topology:
#   r2 (cEOS, AS 65002)
#     Loopback0: 2.2.2.2/32
#        |  [Ethernet1] 10.0.0.1/31
#        |  eBGP
#        |  [1/1/c1/1] 10.0.0.0/31
#   r1 (SR-SIM, AS 65001)  system: 1.1.1.1/32
#        |  [1/1/c2/1] 10.0.1.0/31
#        |  iBGP (AS 65001)
#        |  [1/1/c1/1] 10.0.1.1/31
#   r3 (SR-SIM, AS 65001)  system: 3.3.3.3/32
#
# After convergence: r1<->r2 eBGP up, r1<->r3 iBGP up; r1 learns 3.3.3.3/32 via
# iBGP (default-accept), r3 learns 1.1.1.1/32 via iBGP.
#
# REQUIRES A LICENSE: SR-SIM will not boot without a valid Nokia license at
# /nokia/license/license.txt (the `license:` key below).

name: srsim-ceos-ibgp

topology:
  kinds:
    nokia_srsim:
      image: localhost/nokia/srsim:26.3.R1
      license: /home/ubuntu/srsim-license.txt
    arista_ceos:
      image: ceos:4.36.0.1F

  nodes:
    r1:
      kind: nokia_srsim
      type: SR-1
      startup-config: configs/r1.cfg
    r2:
      kind: arista_ceos
      startup-config: configs/r2.cfg
    r3:
      kind: nokia_srsim
      type: SR-1
      startup-config: configs/r3.cfg

  links:
    # r1 eBGP to r2: SR OS port 1/1/c1/1 == endpoint e1-1-c1-1.
    - endpoints: ["r1:e1-1-c1-1", "r2:eth1"]
    # r1 iBGP to r3: r1 port 1/1/c2/1, r3 port 1/1/c1/1.
    - endpoints: ["r1:e1-1-c2-1", "r3:e1-1-c1-1"]

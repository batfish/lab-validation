hostname r2
!
username admin privilege 15 secret admin
!
aaa authorization exec default local
!
interface Loopback0
   ip address 2.2.2.2/32
!
interface Loopback1
   ip address 100.64.0.1/32
!
interface Loopback2
   ip address 100.64.0.2/32
!
interface Ethernet1
   no switchport
   ip address 10.0.0.1/31
!
ip routing
!
ip prefix-list PL_LO0 seq 10 permit 2.2.2.2/32
ip prefix-list PL_LO1 seq 10 permit 100.64.0.1/32
ip prefix-list PL_LO2 seq 10 permit 100.64.0.2/32
!
route-map RM_OUT permit 10
   match ip address prefix-list PL_LO0
   set community 65002:100
!
route-map RM_OUT permit 20
   match ip address prefix-list PL_LO1
   set as-path prepend 65003
!
route-map RM_OUT permit 30
   match ip address prefix-list PL_LO2
!
router bgp 65002
   router-id 2.2.2.2
   neighbor 10.0.0.0 remote-as 65001
   neighbor 10.0.0.0 send-community
   neighbor 10.0.0.0 route-map RM_OUT out
   network 2.2.2.2/32
   network 100.64.0.1/32
   network 100.64.0.2/32
!

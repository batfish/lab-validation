entries:
  - hostname: ".*"
    test_name: test_main_rib_routes
    skip:
      reason: >-
        Management VRF default route (0.0.0.0/0 -> 10.0.0.2) is unresolvable in
        Batfish because mgmt0 is modeled as down, so it is not installed. This
        is unrelated to IS-IS: the isisL2 loopback routes (1.1.1.1/32,
        2.2.2.2/32) do match. Same vrnetlab management artifact as
        nxos_n9kv_ebgp.
  - hostname: r1
    test_name: test_interface_properties
    skip:
      reason: >-
        mgmt0 bandwidth reported as 65535000000 on r1 (virtual max) vs 1Gbps
        in Batfish — vrnetlab artifact on n9kv management interface.

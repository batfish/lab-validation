hostname r1

feature isis

interface loopback0
  ip address 1.1.1.1/32
  ip router isis UNDERLAY

interface Ethernet1/1
  no switchport
  ip address 10.0.0.0/31
  ip router isis UNDERLAY
  isis circuit-type level-2
  isis network point-to-point
  no shutdown

router isis UNDERLAY
  net 49.0001.0000.0000.0011.00
  is-type level-2

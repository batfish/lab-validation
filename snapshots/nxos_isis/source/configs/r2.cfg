hostname r2

feature isis

interface loopback0
  ip address 2.2.2.2/32
  ip router isis UNDERLAY

interface Ethernet1/1
  no switchport
  ip address 10.0.0.1/31
  ip router isis UNDERLAY
  isis circuit-type level-2
  isis network point-to-point
  no shutdown

router isis UNDERLAY
  net 49.0001.0000.0000.0022.00
  is-type level-2
